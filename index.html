<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aerodisc Wheel Configurator</title>
  <link rel="icon" type="image/jpeg" href="public/wheel-1.png">
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --surface: #111111;
      --surface-2: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --text: #f0ede8;
      --text-muted: rgba(240,237,232,0.45);
      --red: #D5001C;
      --chalk: #E8E4D9;
      --guards-red: #B8001F;
      --gentian-blue: #1C3D6E;
      --transition: 400ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: 1fr auto;
      height: 100vh;
      width: 100vw;
    }

    /* ── Car Stage ── */
    .stage {
      grid-column: 1;
      grid-row: 1 / 3;
      position: relative;
      overflow: hidden;
      background: var(--black);
    }

    .stage-bg { display: none; }
    .stage-floor { display: none; }

    .car-img-wrapper {
      position: absolute;
      inset: 0;
    }

    .car-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      opacity: 0;
      transition: opacity var(--transition);
      z-index: 2;
    }

    .car-img.active {
      opacity: 1;
    }

    .car-img.fade-out {
      opacity: 0;
    }

    /* ── Intro last frame (bridge between video and IOD image) ── */
    #introLastFrame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      opacity: 0;
      transition: opacity 600ms ease;
    }

    /* ── Intro Video ── */
    #introVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 5;
      opacity: 1;
      transition: opacity 800ms ease;
      pointer-events: none;
    }

    #introVideo.fade-out {
      opacity: 0;
    }

    /* loading shimmer */
    .stage-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 200ms;
      pointer-events: none;
    }

    .stage-loading.visible { opacity: 1; }

    .loader-ring {
      width: 32px;
      height: 32px;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* corner label */
    .stage-label {
      position: absolute;
      top: 32px;
      left: 36px;
      pointer-events: none;
    }

    .stage-label-model {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 3vw, 42px);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    .stage-label-sub {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Config Panel ── */
    .panel {
      grid-column: 2;
      grid-row: 1 / 3;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    .panel-header {
      padding: 32px 28px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-header-eyebrow {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 8px;
    }

    .panel-header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 0.03em;
      line-height: 1;
    }

    .panel-header-price {
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .panel-header-price span {
      color: var(--text);
      font-weight: 400;
    }

    /* Sections */
    .config-section {
      padding: 24px 28px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* Color swatches */
    .color-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .color-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 180ms, background 180ms;
      position: relative;
    }

    .color-option:hover {
      border-color: rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
    }

    .color-option.active {
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.05);
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15), 0 2px 8px rgba(0,0,0,0.4);
    }

    .color-swatch.metallic::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 60%);
    }

    .color-info { flex: 1; }

    .color-name {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .color-type {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    .color-check {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 180ms, background 180ms;
    }

    .color-option.active .color-check {
      border-color: var(--text);
      background: var(--text);
    }

    .color-check-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--black);
      opacity: 0;
      transition: opacity 180ms;
    }

    .color-option.active .color-check-dot { opacity: 1; }

    /* Wheel options — 3x3 grid of pattern thumbnails */
    .wheel-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .wheel-option {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface-2);
      border: 2px solid transparent;
      transition: border-color 180ms, transform 180ms;
    }

    .wheel-option:hover {
      border-color: rgba(255,255,255,0.25);
    }

    .wheel-option.active {
      border-color: var(--text);
    }

    .wheel-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 200ms;
    }

    .wheel-selected-label {
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--text);
    }
    .wheel-selected-label .price {
      color: var(--text-muted);
      margin-left: 6px;
      font-size: 12px;
    }
    .wheel-selected-label .sku {
      margin-top: 4px;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      font-family: 'Bebas Neue', sans-serif;
    }

    /* ── Reference Image Upload ── */
    .upload-zone {
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 200ms, background 200ms;
      text-align: center;
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.04);
    }

    .upload-zone-icon {
      font-size: 20px;
      opacity: 0.4;
      line-height: 1;
    }

    .upload-zone-text {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .upload-zone-text strong {
      color: var(--text);
      font-weight: 400;
    }

    .upload-error {
      font-size: 10px;
      color: var(--red);
      letter-spacing: 0.05em;
      margin-top: 4px;
      display: none;
    }

    .upload-error.visible { display: block; }

    .upload-success {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      background: rgba(255,255,255,0.03);
    }

    .upload-success.visible { display: flex; }

    .upload-success-icon {
      color: var(--red);
      font-size: 14px;
      flex-shrink: 0;
    }

    .upload-success-name {
      flex: 1;
      font-size: 12px;
      color: var(--text);
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .upload-change-btn {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 0;
      transition: color 150ms;
      flex-shrink: 0;
      font-family: 'DM Sans', sans-serif;
    }

    .upload-change-btn:hover { color: var(--text); }

    /* Summary */
    .config-summary {
      padding: 20px 28px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 5px 0;
      font-size: 12px;
    }

    .summary-label { color: var(--text-muted); }
    .summary-value { color: var(--text); letter-spacing: 0.03em; }

    .summary-divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 4px 0;
    }

    .summary-total-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .summary-total-price {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* CTA */
    .panel-cta {
      padding: 20px 28px 28px;
      flex-shrink: 0;
      margin-top: auto;
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--text);
      color: var(--black);
      border: none;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 200ms, transform 100ms;
    }

    .btn-primary:hover { background: #e0dcd6; }
    .btn-primary:active { transform: scale(0.99); }

    .btn-secondary {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 200ms, background 200ms;
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.04);
    }

    /* IOD status info */
    .stage-info {
      position: absolute;
      top: 32px;
      right: 32px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      backdrop-filter: blur(8px);
      display: none;
    }

    /* ── Mobile ── */
    @media (max-width: 860px) {
      html, body { overflow: auto; }

      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 95vw 1fr;
        height: auto;
        min-height: 100vh;
      }

      .stage {
        grid-column: 1;
        grid-row: 1;
      }

      .stage-label { top: 20px; left: 20px; }

      .panel {
        grid-column: 1;
        grid-row: 2;
        border-left: none;
        border-top: 1px solid var(--border);
        overflow: visible;
      }

      /* Colors: horizontal row on mobile */
      .color-grid {
        flex-direction: row;
        justify-content: space-between;
        gap: 10px;
      }

      .color-option {
        flex: 1;
        flex-direction: column;
        gap: 6px;
        padding: 10px 6px;
        text-align: center;
      }

      .color-swatch { width: 32px; height: 32px; }

      .color-info { flex: none; width: 100%; }
      .color-name { font-size: 12px; }
      .color-type { font-size: 10px; }

      /* hide the right-side check indicator in row mode */
      .color-option .color-check { display: none; }
    }
    /* ── Wheel spin overlays ── */
    .wheel-spin-overlay {
      position: absolute;
      border-radius: 50%;
      object-fit: cover;
      pointer-events: none;
      opacity: 0;
      z-index: 5;
      /* mask to circle so the rectangular JPEG looks round */
      box-shadow: 0 0 0 3px rgba(0,0,0,0.35);
    }

    .wheel-spin-overlay.spinning {
      opacity: 1;
      animation: wheelSpin 0.45s linear infinite;
    }

    .wheel-spin-overlay.visible {
      opacity: 1;
    }

    @keyframes wheelSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

  </style>
</head>
<body>

<div class="app">

  <!-- ── Stage ── -->
  <section class="stage">
    <div class="stage-bg"></div>
    <div class="stage-floor"></div>

    <div class="stage-label">
      <div class="stage-label-model">911 McLaren S</div>
      <div class="stage-label-sub">2026 · Coupé</div>
    </div>

    <img id="introLastFrame" src="public/last-frame.jpg" alt="">

    <video id="introVideo" autoplay muted playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>

    <div class="car-img-wrapper" id="carStage">
      <!-- Images injected by JS -->
    </div>

    <!-- Wheel spin overlay (rear wheel only) -->
    <img class="wheel-spin-overlay" id="wheelOverlayRear"  alt="" src="">
    <!-- Front wheel overlay (static, no spin) -->
    <img class="wheel-spin-overlay" id="wheelOverlayFront" alt="" src="">

    <div class="stage-loading" id="stageLoading">
      <div class="loader-ring"></div>
    </div>

  </section>

  <!-- ── Config Panel ── -->
  <aside class="panel">

    <div class="panel-header">
      <div class="panel-header-eyebrow">Configure Yours</div>
      <div class="panel-header-title">911 McLaren S</div>
      <div class="panel-header-price">Starting at <span>$133,000</span></div>
    </div>

    <!-- Exterior Color -->
    <div class="config-section">
      <div class="section-label">Exterior Color</div>
      <div class="color-grid" id="colorGrid"></div>
    </div>

    <!-- Wheels -->
    <div class="config-section">
      <div class="section-label">Wheels</div>
      <div class="wheel-grid" id="wheelGrid"></div>
      <div class="wheel-selected-label" id="wheelSelectedLabel"></div>
    </div>

    <!-- Reference Image -->
    <div class="config-section">
      <div class="section-label">Reference Image</div>

      <div class="upload-zone" id="uploadZone">
        <div class="upload-zone-icon">↑</div>
        <div class="upload-zone-text">
          <strong>Drop an image here</strong><br>
          or click to browse
        </div>
      </div>

      <div class="upload-error" id="uploadError"></div>

      <div class="upload-success" id="uploadSuccess">
        <span class="upload-success-icon">✓</span>
        <span class="upload-success-name" id="uploadFileName"></span>
        <button class="upload-change-btn" id="uploadChangeBtn">Change</button>
      </div>

      <input type="file" id="uploadInput" accept="image/*" style="display:none">
    </div>

    <!-- Summary -->
    <div class="config-summary" id="configSummary"></div>

    <!-- CTA -->
    <div class="panel-cta">
      <button class="btn-primary">Request a Test Drive</button>
      <button class="btn-secondary">Save Configuration</button>
    </div>

  </aside>
</div>

<script>
// ── IOD URL Builder ──────────────────────────────────────────────────────────

const BASE_OPTIONS = [
  "1G8","3S4","4F6","4GP","4UB","5XX",
  "6I3","6NQ","7AL","9P8","9ZE","EM2","G1F",
  "IV2","IW3","LGTDRL","PH","Q5A","QR9","QU8","UP9","VC2","Z1S"
];

function buildIodHash(colorCode, wheelCode, cameraId) {
  const options = [...BASE_OPTIONS, colorCode, wheelCode].sort();
  const config = {
    config: {
      animations: [],
      camera: { id: cameraId, options: { variant: "desktop" } },
      environment: { id: "Oasis", options: {} },
      lighting: { id: "DAY", options: {} },
      product: {
        id: "9921B2",
        options: { config: options, country: "US", modelYear: 2026 }
      }
    },
    settings: { format: "jpeg", transparent: false }
  };
  return LZString.compressToEncodedURIComponent(JSON.stringify(config));
}

function iodUrl(colorCode, wheelCode, cameraId) {
  const hash = buildIodHash(colorCode, wheelCode, cameraId);
  return `https://prs.porsche.com/iod/image/US/9921B2/1/${hash}?clientId=icc`;
}

function thumbUrl(colorCode, wheelCode, cameraId) {
  const hash = buildIodHash(colorCode, wheelCode, cameraId);
  return `https://prs.porsche.com/iod/thumbnail/US/9921B2/1/${hash}?clientId=icc`;
}

// ── Config Data ──────────────────────────────────────────────────────────────

const COLORS = [
  {
    id: "0Q",
    name: "Chalk",
    type: "Solid",
    hex: "#E4E0D5",
    metallic: false,
    price: 0,
    img: "public/t-white.jpeg"
  },
  {
    id: "G1",
    name: "Guards Red",
    type: "Solid",
    hex: "#B8001F",
    metallic: false,
    price: 0,
    img: "public/t-red.jpeg"
  },
  {
    id: "45",
    name: "Gentian Blue",
    type: "Metallic",
    hex: "#1C3D6E",
    metallic: true,
    price: 820,
    img: "public/t-blue.jpeg"
  }
];

const WHEELS = [
  { id: "w1", sku: "HCN-1001", name: "Crimson Vortex", size: '20" / 21"', price:    0, thumb: "public/wheel-1.png" },
  { id: "w2", sku: "HCN-1002", name: "Stealth Rotor",  size: '20" / 21"', price:  820, thumb: "public/wheel-2.png" },
  { id: "w3", sku: "HCN-1003", name: "Arctic Camo",    size: '20" / 21"', price:  820, thumb: "public/wheel-3.png" },
  { id: "w4", sku: "HCN-1004", name: "Hex Carbon",     size: '20" / 21"', price: 1640, thumb: "public/wheel-4.png" },
  { id: "w5", sku: "HCN-1005", name: "Solar Flare",    size: '20" / 21"', price: 1640, thumb: "public/wheel-5.png" },
  { id: "w6", sku: "HCN-1006", name: "Crimson Web",    size: '20" / 21"', price: 2200, thumb: "public/wheel-6.png" },
  { id: "w7", sku: "HCN-1007", name: "Onyx Stealth",   size: '20" / 21"', price: 2840, thumb: "public/wheel-7.png" },
  { id: "w8", sku: "HCN-1008", name: "Apex Striker",   size: '20" / 21"', price: 2840, thumb: "public/wheel-8.png" },
  { id: "w9", sku: "HCN-1009", name: "Inferno Halo",   size: '20" / 21"', price: 3500, thumb: "public/wheel-9.png" }
];

// ── State ────────────────────────────────────────────────────────────────────

const SIDE_PERSP_ID = "ext-low-side-left";

const state = {
  color: "0Q",
  wheel: null,
  persp: SIDE_PERSP_ID
};

// Preloaded Image cache
const imgCache = {};

// ── DOM refs ─────────────────────────────────────────────────────────────────

const carStage = document.getElementById("carStage");
const stageLoading = document.getElementById("stageLoading");
const colorGrid = document.getElementById("colorGrid");
const wheelGrid = document.getElementById("wheelGrid");
const configSummary = document.getElementById("configSummary");

// ── Build color grid ─────────────────────────────────────────────────────────

COLORS.forEach(c => {
  const opt = document.createElement("div");
  opt.className = "color-option" + (c.id === state.color ? " active" : "");
  opt.dataset.id = c.id;
  opt.innerHTML = `
    <div class="color-swatch${c.metallic ? " metallic" : ""}" style="background:${c.hex}"></div>
    <div class="color-info">
      <div class="color-name">${c.name}</div>
      <div class="color-type">${c.type}${c.price > 0 ? ` · $${c.price.toLocaleString()}` : ""}</div>
    </div>
    <div class="color-check"><div class="color-check-dot"></div></div>
  `;
  opt.addEventListener("click", () => {
    state.color = c.id;
    document.querySelectorAll(".color-option").forEach(el => el.classList.remove("active"));
    opt.classList.add("active");
    showCar();
    renderSummary();
  });
  colorGrid.appendChild(opt);
});

// ── Build wheel grid ─────────────────────────────────────────────────────────

WHEELS.forEach(w => {
  const opt = document.createElement("div");
  opt.className = "wheel-option" + (w.id === state.wheel ? " active" : "");
  opt.dataset.id = w.id;
  opt.title = `${w.name}${w.price > 0 ? ` · $${w.price.toLocaleString()}` : ""}`;

  opt.innerHTML = `
    <img class="wheel-thumb" src="${w.thumb}" alt="${w.name}" onerror="this.style.opacity='0'">
  `;

  opt.addEventListener("click", () => {
    state.wheel = w.id;
    document.querySelectorAll(".wheel-option").forEach(el => el.classList.remove("active"));
    opt.classList.add("active");
    renderWheelLabel();
    showCar();
    renderSummary();
  });
  wheelGrid.appendChild(opt);
});

const wheelSelectedLabel = document.getElementById("wheelSelectedLabel");
function renderWheelLabel() {
  const w = WHEELS.find(x => x.id === state.wheel);
  if (!w) {
    wheelSelectedLabel.innerHTML = `<span class="price">Select a wheel</span>`;
    return;
  }
  wheelSelectedLabel.innerHTML = `
    ${w.name}<span class="price">${w.price > 0 ? `+$${w.price.toLocaleString()}` : "Included"}</span>
    <div class="sku">SKU · ${w.sku}</div>
  `;
}
renderWheelLabel();


// ── Car image display ─────────────────────────────────────────────────────────

function cacheKey(color, wheel, persp) {
  return `${color}_${wheel}_${persp}`;
}

function getOrCreateImg(color, wheel, persp) {
  const key = cacheKey(color, wheel, persp);
  if (imgCache[key]) return imgCache[key];

  const img = document.createElement("img");
  img.className = "car-img";
  img.alt = `Porsche 911 - ${color} - ${wheel}`;
  const colorObj = COLORS.find(c => c.id === color);
  img.src = colorObj && colorObj.img ? colorObj.img : iodUrl(color, wheel, persp);

  img.onload = () => {
    // if this is the current config, show it
    if (key === cacheKey(state.color, state.wheel, state.persp)) {
      revealCurrent(key);
    }
  };

  img.onerror = () => {
    img.dataset.failed = "1";
    if (key === cacheKey(state.color, state.wheel, state.persp)) {
      stageLoading.classList.remove("visible");
    }
  };

  carStage.appendChild(img);
  imgCache[key] = img;
  return img;
}

let introActive = true;
let lastFrameActive = true;
const lastFrameEl = document.getElementById("introLastFrame");

function dismissLastFrame() {
  if (!lastFrameActive) return;
  lastFrameActive = false;
  lastFrameEl.style.opacity = "0";
  lastFrameEl.addEventListener("transitionend", () => {
    lastFrameEl.style.display = "none";
  }, { once: true });
}

function revealCurrent(key) {
  if (introActive) return;
  dismissLastFrame();   // last-frame 与 IOD 图同步淡出/淡入
  // Hide all
  Object.entries(imgCache).forEach(([k, img]) => {
    img.classList.remove("active");
  });
  // Show current
  if (imgCache[key]) {
    imgCache[key].classList.add("active");
  }
  stageLoading.classList.remove("visible");
}

function showCar() {
  const { color, wheel, persp } = state;
  const key = cacheKey(color, wheel, persp);

  const img = getOrCreateImg(color, wheel, persp);

  if (img.complete && !img.dataset.failed) {
    revealCurrent(key);
  } else {
    // show loader, wait for onload
    stageLoading.classList.add("visible");
    // hide others immediately
    Object.entries(imgCache).forEach(([k, i]) => {
      if (k !== key) i.classList.remove("active");
    });
  }

  // Preload adjacent combos
  preloadNeighbors(color, wheel, persp);
}

function preloadNeighbors(color, wheel, persp) {
  COLORS.forEach(c => {
    WHEELS.forEach(w => {
      // preload all on current perspective
      getOrCreateImg(c.id, w.id, persp);
    });
  });
}

// ── Summary ──────────────────────────────────────────────────────────────────

function renderSummary() {
  const color = COLORS.find(c => c.id === state.color);
  const wheel = WHEELS.find(w => w.id === state.wheel);

  const basePrice = 133000;
  const colorPrice = color?.price || 0;
  const wheelPrice = wheel?.price || 0;
  const total = basePrice + colorPrice + wheelPrice;

  configSummary.innerHTML = `
    <div class="summary-row">
      <span class="summary-label">911 McLaren S Coupé</span>
      <span class="summary-value">$${basePrice.toLocaleString()}</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">${color?.name || ""}</span>
      <span class="summary-value">${colorPrice > 0 ? "$" + colorPrice.toLocaleString() : "Included"}</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">${wheel ? `${wheel.name} <em style="font-style:normal;color:var(--text-muted);font-size:10px;letter-spacing:0.15em;margin-left:6px;">${wheel.sku}</em>` : "Wheels"}</span>
      <span class="summary-value">${wheel ? (wheelPrice > 0 ? "$" + wheelPrice.toLocaleString() : "Included") : "—"}</span>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-total">
      <span class="summary-total-label">Total</span>
      <span class="summary-total-price">$${total.toLocaleString()}</span>
    </div>
  `;
}

// ── Init ──────────────────────────────────────────────────────────────────────

renderSummary();
showCar();

// ── Intro video → fade out → show car ────────────────────────────────────────

(function () {
  const video = document.getElementById("introVideo");
  if (!video) return;

  function endIntro() {
    introActive = false;
    lastFrameEl.style.opacity = "1";  // last-frame 淡入
    video.classList.add("fade-out");   // 视频同步淡出
    video.addEventListener("transitionend", () => {
      video.style.display = "none";
    }, { once: true });
  }

  video.addEventListener("ended", endIntro);

  // 视频加载失败 → 直接跳过
  video.addEventListener("error", () => {
    introActive = false;
    video.style.display = "none";
  });
})();

// preload all color×wheel combos for the side view in background after a short delay
setTimeout(() => {
  COLORS.forEach(c => {
    WHEELS.forEach(w => {
      getOrCreateImg(c.id, w.id, SIDE_PERSP_ID);
    });
  });
}, 1500);

// ── Wheel Spin Mode ───────────────────────────────────────────────────────────

const wheelOverlayR  = document.getElementById("wheelOverlayRear");
const wheelOverlayF  = document.getElementById("wheelOverlayFront");
const stageEl        = document.querySelector(".stage");

// ── Rear-wheel overlay placement ────────────────────────────────────────────
// Values are fractions of the underlying car image (1920×1080).
// Tweak these three numbers to align with the rear wheel:
//   REAR_CX → horizontal center (0=left edge, 1=right edge)
//   REAR_CY → vertical   center (0=top,      1=bottom)
//   REAR_R  → radius (fraction of image HEIGHT)
const SIDE_RATIO = 1920 / 1080;
let REAR_CX = 0.68;
let REAR_CY = 0.57;
let REAR_R  = 0.068;
let FRONT_CX = 0.308;
let FRONT_CY = 0.57;
let FRONT_R  = 0.068;

// Console tuning helper: tuneWheel(cx, cy, r) — pass any/all, undefined keeps current
window.tuneWheel = (cx, cy, r) => {
  if (cx !== undefined) REAR_CX = cx;
  if (cy !== undefined) REAR_CY = cy;
  if (r  !== undefined) REAR_R  = r;
  positionWheelOverlays();
  console.log(`REAR_CX=${REAR_CX}  REAR_CY=${REAR_CY}  REAR_R=${REAR_R}`);
};
window.tuneFrontWheel = (cx, cy, r) => {
  if (cx !== undefined) FRONT_CX = cx;
  if (cy !== undefined) FRONT_CY = cy;
  if (r  !== undefined) FRONT_R  = r;
  positionWheelOverlays();
  console.log(`FRONT_CX=${FRONT_CX}  FRONT_CY=${FRONT_CY}  FRONT_R=${FRONT_R}`);
};

function positionWheelOverlays() {
  const cw = stageEl.offsetWidth;
  const ch = stageEl.offsetHeight;

  // Compute rendered image bounds under object-fit:cover
  let rW, rH, ox, oy;
  if (cw / ch > SIDE_RATIO) {
    rW = cw; rH = cw / SIDE_RATIO;
    ox = 0;  oy = (ch - rH) / 2;
  } else {
    rH = ch; rW = ch * SIDE_RATIO;
    ox = (cw - rW) / 2; oy = 0;
  }

  const cx = ox + REAR_CX * rW;
  const cy = oy + REAR_CY * rH;
  const r  = REAR_R  * rH;
  wheelOverlayR.style.left   = (cx - r) + "px";
  wheelOverlayR.style.top    = (cy - r) + "px";
  wheelOverlayR.style.width  = (r * 2)  + "px";
  wheelOverlayR.style.height = (r * 2)  + "px";

  const fcx = ox + FRONT_CX * rW;
  const fcy = oy + FRONT_CY * rH;
  const fr  = FRONT_R  * rH;
  wheelOverlayF.style.left   = (fcx - fr) + "px";
  wheelOverlayF.style.top    = (fcy - fr) + "px";
  wheelOverlayF.style.width  = (fr * 2)   + "px";
  wheelOverlayF.style.height = (fr * 2)   + "px";
}

function updateSpinWheel() {
  const activeWheel = WHEELS.find(w => w.id === state.wheel);
  if (!activeWheel) {
    wheelOverlayR.classList.remove("spinning");
    wheelOverlayF.classList.remove("visible");
    wheelOverlayR.src = "";
    wheelOverlayF.src = "";
    return;
  }
  wheelOverlayR.src = activeWheel.thumb;
  wheelOverlayF.src = activeWheel.thumb;
  positionWheelOverlays();
  wheelOverlayR.classList.add("spinning");
  wheelOverlayF.classList.add("visible");
}

// Spin activates when a wheel is selected; switching updates the overlay source
document.getElementById("wheelGrid").addEventListener("click", updateSpinWheel);

// Reposition on resize (only relevant once a wheel is chosen)
window.addEventListener("resize", () => {
  if (state.wheel) positionWheelOverlays();
});

// ── Reference Image Upload ────────────────────────────────────────────────────

let uploadedFile = null;

const uploadZone      = document.getElementById("uploadZone");
const uploadInput     = document.getElementById("uploadInput");
const uploadError     = document.getElementById("uploadError");
const uploadSuccess   = document.getElementById("uploadSuccess");
const uploadFileName  = document.getElementById("uploadFileName");
const uploadChangeBtn = document.getElementById("uploadChangeBtn");

const MAX_SIZE = 10 * 1024 * 1024; // 10MB

function handleFile(file) {
  uploadError.classList.remove("visible");

  if (!file.type.startsWith("image/")) {
    uploadError.textContent = "Please upload an image file (JPG, PNG, WEBP, GIF).";
    uploadError.classList.add("visible");
    return;
  }

  if (file.size > MAX_SIZE) {
    uploadError.textContent = "File exceeds 10 MB limit. Please choose a smaller image.";
    uploadError.classList.add("visible");
    return;
  }

  uploadedFile = file;
  uploadFileName.textContent = file.name;
  uploadZone.style.display = "none";
  uploadSuccess.classList.add("visible");
}

function resetUpload() {
  uploadedFile = null;
  uploadInput.value = "";
  uploadZone.style.display = "";
  uploadSuccess.classList.remove("visible");
  uploadError.classList.remove("visible");
}

uploadZone.addEventListener("click", () => uploadInput.click());
uploadInput.addEventListener("change", () => {
  if (uploadInput.files[0]) handleFile(uploadInput.files[0]);
});

uploadChangeBtn.addEventListener("click", resetUpload);

uploadZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  uploadZone.classList.add("drag-over");
});

uploadZone.addEventListener("dragleave", () => {
  uploadZone.classList.remove("drag-over");
});

uploadZone.addEventListener("drop", (e) => {
  e.preventDefault();
  uploadZone.classList.remove("drag-over");
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
</script>
